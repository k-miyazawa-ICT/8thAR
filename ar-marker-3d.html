<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR マーカー 3D モデル</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #camerafeed { width: 100vw; height: 100vh; display: block; }
    #status {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }
    #log {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 40vh;
      overflow-y: auto;
      background: rgba(0,0,0,0.75);
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      padding: 8px;
      z-index: 999;
    }
  </style>
</head>
<body>

<div id="status">読み込み中...</div>
<canvas id="camerafeed"></canvas>
<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script
  src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
  crossorigin="anonymous"
  data-preload-chunks="slam">
</script>

<script>
const status = document.getElementById('status')
const logEl  = document.getElementById('log')
const canvas = document.getElementById('camerafeed')

// 画面上にログ表示
const log = (...args) => {
  const msg = args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ')
  console.log(msg)
  const line = document.createElement('div')
  line.textContent = new Date().toLocaleTimeString() + ' ' + msg
  logEl.appendChild(line)
  logEl.scrollTop = logEl.scrollHeight
}

let model = null
let anchored = false
let threeScene, threeCamera, threeRenderer
let samples = []
const REQUIRED_SAMPLES = 15
const STABLE_DISTANCE = 0.02 // 5mm以内なら安定と判定

const onXrLoaded = () => {
  log('XR8読み込み完了')

  fetch('./targets/frame.json')
    .then(r => {
      log('frame.json status:', r.status)
      if (!r.ok) throw new Error('HTTP ' + r.status)
      return r.json()
    })
    .then(targetData => {
      log('frame.json読み込み成功 name:', targetData.name)

      threeScene    = new THREE.Scene()
      threeCamera   = new THREE.PerspectiveCamera()
      threeRenderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true })
      threeRenderer.setPixelRatio(window.devicePixelRatio)
      threeRenderer.setSize(window.innerWidth, window.innerHeight)
      threeRenderer.autoClear = false

      threeScene.add(new THREE.AmbientLight(0xffffff, 1.5))
      const dir = new THREE.DirectionalLight(0xffffff, 1)
      dir.position.set(1, 2, 1)
      threeScene.add(dir)

      const loader = new THREE.GLTFLoader()
      loader.load('./targets/model.glb',
        gltf => {
          model = gltf.scene

          // SolidWorksのmm → Three.js/ARのm に変換
          model.scale.set(1, 1, 1)

          model.visible = false

          const box = new THREE.Box3().setFromObject(model)
          const size = new THREE.Vector3()
          box.getSize(size)
          log('モデルサイズ(m):', size.x, size.y, size.z)

          threeScene.add(model)
          log('モデル読み込み完了')
        },
        undefined,
        e => log('モデル読み込み失敗:', e.message)
      )

      const myModule = {
        name: 'myARModule',
        onStart: () => {
          log('ARエンジン開始')
          status.textContent = 'マーカーをカメラに向けてください'
        },
        onUpdate: ({ processCpuResult }) => {
          const reality = processCpuResult.reality
          if (!reality) return
          const { rotation, position, intrinsics } = reality
          if (rotation) threeCamera.quaternion.set(rotation.x, rotation.y, rotation.z, rotation.w)
          if (position) threeCamera.position.set(position.x, position.y, position.z)
          if (intrinsics) {
            threeCamera.projectionMatrix.fromArray(intrinsics)
            threeCamera.projectionMatrixInverse.copy(threeCamera.projectionMatrix).invert()
          }
        },
        onRender: () => {
          threeRenderer.clearDepth()
          threeRenderer.render(threeScene, threeCamera)
        },
        listeners: [
          { event: 'reality.imagefound',   process: ({ detail }) => { log('マーカー発見!', detail.name); onImageEvent(detail) } },
          { event: 'reality.imageupdated', process: ({ detail }) => onImageEvent(detail) },
          { event: 'reality.imagelost',    process: () => { log('マーカー消失'); onImageLost() } },
        ],
      }

      log('XrController設定中...')
      XR8.XrController.configure({
        imageTargetData: [targetData],
        scale: 'absolute'
      })

      log('パイプライン追加中...')
      XR8.addCameraPipelineModules([
        XR8.GlTextureRenderer.pipelineModule(),
        XR8.Threejs.pipelineModule(),
        XR8.XrController.pipelineModule(),
        myModule,
      ])

      log('XR8.run開始...')
      XR8.run({ canvas, allowedDevices: XR8.XrConfig.device().ANY })
    })
    .catch(e => {
      log('エラー:', e.message)
      status.textContent = 'エラー: ' + e.message
    })
}

const onImageEvent = (detail) => {
  if (!model) return

  // 固定後は imageupdated を無視
  if (anchored) return

  const pos = new THREE.Vector3(
    detail.position.x,
    detail.position.y,
    detail.position.z
  )

  const rot = new THREE.Quaternion(
    detail.rotation.x,
    detail.rotation.y,
    detail.rotation.z,
    detail.rotation.w
  )

  samples.push({ position: pos, rotation: rot })

  if (samples.length > REQUIRED_SAMPLES) {
    samples.shift()
  }

  // まずは追従表示
  model.position.copy(pos)
  model.quaternion.copy(rot)
  model.visible = true

  status.textContent = `安定待ち... ${samples.length}/${REQUIRED_SAMPLES}`

  if (samples.length < REQUIRED_SAMPLES) return

  // 位置の平均を計算
  const avgPos = new THREE.Vector3()
  samples.forEach(s => avgPos.add(s.position))
  avgPos.divideScalar(samples.length)

  // ブレ量を確認
  let maxDistance = 0
  samples.forEach(s => {
    const d = s.position.distanceTo(avgPos)
    if (d > maxDistance) maxDistance = d
  })

  // まだブレているなら固定しない
  if (maxDistance > STABLE_DISTANCE) {
    status.textContent = `安定待ち... ブレ ${(maxDistance * 1000).toFixed(1)}mm`
    return
  }

  // 回転は徐々に平均化
  const avgRot = samples[0].rotation.clone()
  for (let i = 1; i < samples.length; i++) {
    avgRot.slerp(samples[i].rotation, 1 / (i + 1))
  }

  // 平均位置・平均角度で固定
  model.position.copy(avgPos)
  model.quaternion.copy(avgRot)
  model.visible = true

  anchored = true
  status.textContent = '3D固定しました！'
  log('3D固定完了 maxDistance(mm):', (maxDistance * 1000).toFixed(2))

  setTimeout(() => { status.style.opacity = '0' }, 3000)
}

const onImageLost = () => {
  if (anchored) {
    status.textContent = 'マーカーなしで固定中'
    status.style.opacity = '1'
    setTimeout(() => { status.style.opacity = '0' }, 2000)
  }
}

window.XR8
  ? onXrLoaded()
  : window.addEventListener('xrloaded', onXrLoaded)
</script>

</body>
</html>
