<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR マーカー 3D モデル</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #camerafeed { width: 100vw; height: 100vh; display: block; }
    #status {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>

<div id="status">読み込み中...</div>
<canvas id="camerafeed"></canvas>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- GLTFLoader -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<!-- 8th Wall エンジン -->
<script
  src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
  crossorigin="anonymous"
  data-preload-chunks="slam">
</script>

<script>
const status = document.getElementById('status')
const canvas = document.getElementById('camerafeed')
let model = null
let anchored = false
let threeScene, threeCamera, threeRenderer

const onXrLoaded = () => {
  fetch('./targets/frame.json')
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status)
      return r.json()
    })
    .then(targetData => {
      status.textContent = 'カメラを起動中...'

      threeScene    = new THREE.Scene()
      threeCamera   = new THREE.PerspectiveCamera()
      threeRenderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true })
      threeRenderer.setPixelRatio(window.devicePixelRatio)
      threeRenderer.setSize(window.innerWidth, window.innerHeight)
      threeRenderer.autoClear = false

      // ライト
      threeScene.add(new THREE.AmbientLight(0xffffff, 1.5))
      const dir = new THREE.DirectionalLight(0xffffff, 1)
      dir.position.set(1, 2, 1)
      threeScene.add(dir)

      // GLTFモデル読み込み
      const loader = new THREE.GLTFLoader()
      loader.load('./targets/model.glb',
        gltf => {
          model = gltf.scene
          model.visible = false
          threeScene.add(model)
          console.log('モデル読み込み完了')
        },
        undefined,
        e => console.error('モデル読み込み失敗', e)
      )

      // 8th Wall パイプラインモジュール
      const myModule = {
        name: 'myARModule',
        onUpdate: ({ processCpuResult }) => {
          const reality = processCpuResult.reality
          if (!reality) return
          const { rotation, position, intrinsics } = reality
          if (rotation) threeCamera.quaternion.set(rotation.x, rotation.y, rotation.z, rotation.w)
          if (position) threeCamera.position.set(position.x, position.y, position.z)
          if (intrinsics) {
            threeCamera.projectionMatrix.fromArray(intrinsics)
            threeCamera.projectionMatrixInverse.copy(threeCamera.projectionMatrix).invert()
          }
        },
        onRender: () => {
          threeRenderer.clearDepth()
          threeRenderer.render(threeScene, threeCamera)
        },
        listeners: [
          { event: 'reality.imagefound',   process: ({ detail }) => onImageEvent(detail) },
          { event: 'reality.imageupdated', process: ({ detail }) => onImageEvent(detail) },
          { event: 'reality.imagelost',    process: () => onImageLost() },
        ],
      }

      XR8.XrController.configure({
        imageTargetData: [targetData],
      })

      XR8.addCameraPipelineModules([
        XR8.GlTextureRenderer.pipelineModule(),
        XR8.Threejs.pipelineModule(),
        XR8.XrController.pipelineModule(),
        myModule,
      ])

      XR8.run({
        canvas,
        allowedDevices: XR8.XrConfig.device().ANY,
      })
    })
    .catch(e => {
      console.error('frame.json 読み込み失敗:', e)
      status.textContent = 'エラー: ' + e.message
    })
}

const onImageEvent = (detail) => {
  if (!model) return
  model.position.copy(detail.position)
  model.quaternion.copy(detail.rotation)
  const s = detail.scale * 0.1
  model.scale.set(s, s, s)
  model.visible = true

  if (!anchored) {
    anchored = true
    status.textContent = '3D固定しました（マーカーを外してもOK）'
    setTimeout(() => { status.style.opacity = '0' }, 3000)
  }
}

const onImageLost = () => {
  if (anchored) {
    status.textContent = 'マーカーなしで空間に固定中'
    status.style.opacity = '1'
    setTimeout(() => { status.style.opacity = '0' }, 2000)
  }
}

window.XR8
  ? onXrLoaded()
  : window.addEventListener('xrloaded', onXrLoaded)
</script>

</body>
</html>
