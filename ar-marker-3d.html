<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR マーカー 3D モデル</title>

  <!-- 8th Wall エンジン（CDNから直接読み込み） -->
  <script async
    src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    crossorigin="anonymous"
    data-preload-chunks="slam">
  </script>

  <!-- A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }
    #status {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 999;
      pointer-events: none;
      transition: opacity 0.5s;
      white-space: nowrap;
    }
    #status.hidden { opacity: 0; }
  </style>
</head>
<body>

<div id="status">読み込み中...</div>

<a-scene
  xrconfig
  xrweb
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  loading-screen="enabled: false"
>

  <a-assets>
    <a-asset-item id="model" src="./targets/model.glb"></a-asset-item>
  </a-assets>

  <!-- カメラ -->
  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
  ></a-camera>

  <!-- 3Dオブジェクト（マーカー消えても位置維持） -->
  <a-entity id="ar-object" visible="false">
    <a-gltf-model
      src="#model"
      position="0 0 0"
      scale="0.1 0.1 0.1"
    ></a-gltf-model>
  </a-entity>

</a-scene>

<script>
  const status = document.getElementById('status')
  const arObject = document.getElementById('ar-object')
  let anchored = false

  const onXrLoaded = () => {
    // イメージターゲット名を指定（frame.jsonのnameフィールドと一致させる）
    XR8.XrController.configure({
      imageTargets: ['frame'],
    })

    const scene = document.querySelector('a-scene')

    // カメラ起動成功
    scene.addEventListener('realityready', () => {
      status.textContent = 'マーカーをカメラに向けてください'
    })

    // エラー
    scene.addEventListener('realityerror', (e) => {
      status.textContent = 'エラー: カメラを確認してください'
      console.error('reality error', e)
    })

    // マーカー発見・更新
    scene.addEventListener('xrimagefound', onImageFound)
    scene.addEventListener('xrimageupdated', onImageFound)

    // マーカー消失 → 何もしない（SLAMが位置を維持し続ける）
    scene.addEventListener('xrimagelost', () => {
      if (anchored) {
        status.textContent = 'マーカーなしで空間に固定中'
        status.classList.remove('hidden')
        setTimeout(() => status.classList.add('hidden'), 2000)
      }
    })
  }

  const onImageFound = ({ detail }) => {
    const obj = arObject.object3D
    obj.position.copy(detail.position)
    obj.quaternion.copy(detail.rotation)
    obj.scale.set(detail.scale, detail.scale, detail.scale)
    arObject.setAttribute('visible', true)

    if (!anchored) {
      anchored = true
      status.textContent = '3D固定しました（マーカーを外してもOK）'
      setTimeout(() => status.classList.add('hidden'), 3000)
    }
  }

  window.XR8
    ? onXrLoaded()
    : window.addEventListener('xrloaded', onXrLoaded)
</script>

</body>
</html>
