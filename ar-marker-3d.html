<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR マーカー 3D モデル</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #camerafeed { width: 100vw; height: 100vh; display: block; }
    #status {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="status">読み込み中...</div>
<canvas id="camerafeed"></canvas>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- GLTFLoader -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<!-- 8th Wall エンジン -->
<script
  src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
  crossorigin="anonymous"
  data-preload-chunks="slam">
</script>

<script>
const status = document.getElementById('status')
let model = null
let anchored = false
let scene, camera, renderer

const onXrLoaded = () => {
  // frame.json を読み込んでからエンジン起動
  fetch('./targets/frame.json')
    .then(r => r.json())
    .then(targetData => {

      // Three.js シーン初期化
      scene    = new THREE.Scene()
      camera   = new THREE.PerspectiveCamera()
      renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('camerafeed'),
        alpha: true,
        antialias: true,
      })
      renderer.setPixelRatio(window.devicePixelRatio)
      renderer.setSize(window.innerWidth, window.innerHeight)

      // ライト
      scene.add(new THREE.AmbientLight(0xffffff, 1.5))
      const dir = new THREE.DirectionalLight(0xffffff, 1)
      dir.position.set(1, 2, 1)
      scene.add(dir)

      // GLTFモデル読み込み
      const loader = new THREE.GLTFLoader()
      loader.load('./targets/model.glb', gltf => {
        model = gltf.scene
        model.scale.set(0.1, 0.1, 0.1)
        model.visible = false
        scene.add(model)
      })

      // カメラパイプラインモジュール
      const myModule = {
        name: 'myARModule',
        onStart: ({ canvas }) => {
          XR8.XrController.updateCameraProjectionMatrix({
            origin: { x: 0, y: 0, z: 0 },
            facing: { x: 0, y: 0, z: -1, w: 1 },
          })
        },
        onUpdate: ({ processCpuResult }) => {
          const realitySource = processCpuResult.reality
          if (!realitySource) return
          const { rotation, position, intrinsics } = realitySource
          // カメラ姿勢を更新
          if (rotation) camera.quaternion.set(rotation.x, rotation.y, rotation.z, rotation.w)
          if (position) camera.position.set(position.x, position.y, position.z)
          if (intrinsics) {
            const proj = intrinsics
            camera.projectionMatrix.fromArray(proj)
            camera.projectionMatrixInverse.copy(camera.projectionMatrix).invert()
          }
        },
        onRender: () => {
          renderer.clearDepth()
          renderer.render(scene, camera)
        },
        listeners: [
          {
            event: 'reality.imagefound',
            process: ({ detail }) => onImageEvent(detail),
          },
          {
            event: 'reality.imageupdated',
            process: ({ detail }) => onImageEvent(detail),
          },
          {
            event: 'reality.imagelost',
            process: () => onImageLost(),
          },
        ],
      }

      XR8.XrController.configure({
        imageTargetData: [targetData],
      })

      XR8.addCameraPipelineModules([
        XR8.GlTextureRenderer.pipelineModule(),
        XR8.Threejs.pipelineModule(),
        XR8.XrController.pipelineModule(),
        XRExtras.FullWindowCanvas.pipelineModule(),
        XRExtras.Loading.pipelineModule(),
        XRExtras.RuntimeError.pipelineModule(),
        myModule,
      ])

      XR8.run({
        canvas: document.getElementById('camerafeed'),
        allowedDevices: XR8.XrConfig.device().ANY,
      })

      status.textContent = 'カメラを起動中...'
    })
    .catch(e => {
      console.error('frame.json 読み込み失敗', e)
      status.textContent = 'マーカーファイルの読み込みに失敗'
    })
}

const onImageEvent = (detail) => {
  if (!model) return
  model.position.copy(detail.position)
  model.quaternion.copy(detail.rotation)
  const s = detail.scale * 0.1
  model.scale.set(s, s, s)
  model.visible = true

  if (!anchored) {
    anchored = true
    status.textContent = '3D固定しました（マーカーを外してもOK）'
    setTimeout(() => { status.style.opacity = 0 }, 3000)
  }
}

const onImageLost = () => {
  if (anchored) {
    status.textContent = 'マーカーなしで空間に固定中'
    status.style.opacity = 1
    setTimeout(() => { status.style.opacity = 0 }, 2000)
  }
}

window.XR8
  ? onXrLoaded()
  : window.addEventListener('xrloaded', onXrLoaded)
</script>

</body>
</html>
